<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Acesso</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:#fff;
  color:#111;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:24px;
}
.card{
  width:100%;
  max-width:400px;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}
h1{
  font-size:26px;
  font-weight:800;
  color:#111;
  line-height:1.3;
}
p{
  font-size:15px;
  color:#555;
  line-height:1.6;
}
.cta{
  width:100%;
  height:56px;
  border:none;
  border-radius:12px;
  background:#111;
  font-size:16px;
  font-weight:700;
  color:#fff;
  cursor:pointer;
  transition:.2s;
}
.cta:hover{background:#333;}
.loader{
  display:none;
  font-size:14px;
  color:#888;
}
.spinner{
  width:20px;height:20px;
  border:3px solid #ddd;
  border-top:3px solid #111;
  border-radius:50%;
  margin:0 auto 8px;
  animation:spin .8s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="card">
  <h1>Seu acesso está pronto</h1>
  <p>Clique no botão abaixo para continuar.</p>

  <button class="cta" id="enterBtn">CONTINUAR</button>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    Carregando...
  </div>
</div>

const loader = document.getElementById('loader');
